<script>
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const socket = new WebSocket(`${wsProtocol}//${window.location.host}/ws/telemetry`);

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);

        // Update Temps
        if (data.ch101) document.getElementById('ch101').innerText = data.ch101 + ' °C';
        if (data.ch102) document.getElementById('ch102').innerText = data.ch102 + ' °C';
        if (data.ch103) document.getElementById('ch103').innerText = data.ch103 + ' °C';
        if (data.ch104) document.getElementById('ch104').innerText = data.ch104 + ' °C';

        // Update Turbos & Gauges
        if (data.ch112) document.getElementById('ch112').innerText = data.ch112 + ' V';
        if (data.ch113) document.getElementById('ch113').innerText = data.ch113 + ' V';
        if (data.ch115) document.getElementById('ch115').innerText = data.ch115 + ' V';
        if (data.ch116) document.getElementById('ch116').innerText = data.ch116 + ' Torr';

        // Update Convectrons
        if (data.ch118_v) document.getElementById('ch118-v').innerText = data.ch118_v + ' V';
        if (data.ch118_p) document.getElementById('ch118-p').innerText = data.ch118_p + ' Torr';
        if (data.ch119_v) document.getElementById('ch119-v').innerText = data.ch119_v + ' V';
        if (data.ch119_p) document.getElementById('ch119-p').innerText = data.ch119_p + ' Torr';
    };

    socket.onopen = () => {
        document.getElementById('status-text').innerText = 'Live Feed Connected';
        document.getElementById('status-text').className = 'text-sm font-medium text-emerald-400';
    };

    socket.onclose = () => {
        document.getElementById('status-text').innerText = 'Disconnected';
        document.getElementById('status-text').className = 'text-sm font-medium text-rose-400';
        document.getElementById('ping-dot').className = 'hidden';
        document.getElementById('status-dot').className = 'relative inline-flex rounded-full h-3 w-3 bg-rose-500';
    };
</script>
